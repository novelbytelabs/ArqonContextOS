openapi: 3.0.3
info:
  title: ArqonMonkeyOS ContextBus Broker
  version: 0.1.0
  description: Repo-backed ContextBus broker for Arqon role GPTs (legacy name: ContextOS).
servers:
  - url: https://arqon-contextos-broker.sonarum.workers.dev
paths:
  /v1/health:
    get:
      operationId: health
      summary: Broker health check.
      responses:
        "200":
          description: Health response.
          content:
            application/json:
              schema:
                type: object
  /v1/context:
    get:
      operationId: syncContext
      summary: Load role-specific project context.
      parameters:
        - name: project
          in: query
          required: true
          schema:
            type: string
            enum: [ArqonZero]
        - name: role
          in: query
          required: true
          schema:
            type: string
            enum: [PM_AI, CODER_AI, AUDITOR_AI, HELPER_AI, EXPLORER_AI, HYPOTHESIZER_AI, DESIGNER_AI, SCIENCE_AUDITOR_AI, SCIENCE_EXECUTOR_AI, HUMAN]
      responses:
        "200":
          description: Role context.
          content:
            application/json:
              schema:
                type: object
  /v1/constitution:
    get:
      operationId: syncConstitution
      summary: Load role constitution context.
      parameters:
        - name: project
          in: query
          required: true
          schema:
            type: string
            enum: [ArqonZero]
        - name: role
          in: query
          required: true
          schema:
            type: string
            enum: [PM_AI, CODER_AI, AUDITOR_AI, HELPER_AI, EXPLORER_AI, HYPOTHESIZER_AI, DESIGNER_AI, SCIENCE_AUDITOR_AI, SCIENCE_EXECUTOR_AI, HUMAN]
      responses:
        "200":
          description: Constitution context.
          content:
            application/json:
              schema:
                type: object
  /v1/manifest:
    get:
      operationId: getManifest
      summary: Load project context manifest.
      parameters:
        - name: project
          in: query
          required: true
          schema:
            type: string
            enum: [ArqonZero]
      responses:
        "200":
          description: Context manifest.
          content:
            application/json:
              schema:
                type: object
  /v1/notes:
    get:
      operationId: listContextNotes
      summary: List recent non-official context notes.
      parameters:
        - name: project
          in: query
          required: true
          schema:
            type: string
            enum: [ArqonZero]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Note list.
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: saveContextNote
      summary: Save a non-official context note.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Note created.
          content:
            application/json:
              schema:
                type: object
  /v1/messages/inbox:
    get:
      operationId: listInbox
      summary: List messages in a role inbox.
      parameters:
        - name: project
          in: query
          required: true
          schema:
            type: string
            enum: [ArqonZero]
        - name: role
          in: query
          required: true
          schema:
            type: string
            enum: [PM_AI, CODER_AI, AUDITOR_AI, HELPER_AI, EXPLORER_AI, HYPOTHESIZER_AI, DESIGNER_AI, SCIENCE_AUDITOR_AI, SCIENCE_EXECUTOR_AI, HUMAN]
      responses:
        "200":
          description: Inbox list.
          content:
            application/json:
              schema:
                type: object
  /v1/messages:
    post:
      operationId: sendMessage
      summary: Send a message to a role inbox.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Message created.
          content:
            application/json:
              schema:
                type: object
  /v1/messages/{message_id}:
    get:
      operationId: openMessage
      summary: Open a role message.
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: string
        - name: project
          in: query
          required: true
          schema:
            type: string
            enum: [ArqonZero]
        - name: role
          in: query
          required: true
          schema:
            type: string
            enum: [PM_AI, CODER_AI, AUDITOR_AI, HELPER_AI, EXPLORER_AI, HYPOTHESIZER_AI, DESIGNER_AI, SCIENCE_AUDITOR_AI, SCIENCE_EXECUTOR_AI, HUMAN]
      responses:
        "200":
          description: Message payload.
          content:
            application/json:
              schema:
                type: object
  /v1/messages/{message_id}/archive:
    post:
      operationId: archiveMessage
      summary: Copy a message into the role archive.
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: string
        - name: project
          in: query
          required: true
          schema:
            type: string
            enum: [ArqonZero]
        - name: role
          in: query
          required: true
          schema:
            type: string
            enum: [PM_AI, CODER_AI, AUDITOR_AI, HELPER_AI, EXPLORER_AI, HYPOTHESIZER_AI, DESIGNER_AI, SCIENCE_AUDITOR_AI, SCIENCE_EXECUTOR_AI, HUMAN]
      responses:
        "200":
          description: Archived message reference.
          content:
            application/json:
              schema:
                type: object
  /v1/flows:
    get:
      summary: List flows
      description: Lists Flow Core v0.3 flow summaries. Project defaults to ArqonZero when omitted.
      parameters:
        - in: query
          name: project
          schema: { type: string, default: ArqonZero }
        - in: query
          name: type
          schema:
            type: string
            enum: [science_flow, code_flow, audit_flow, governance_flow]
        - in: query
          name: status
          schema:
            type: string
            enum: [active, blocked, completed, archived]
      responses:
        '200': { description: Flow list }
    post:
      summary: Create flow
      description: Creates an official Flow Core v0.3 flow manifest and index entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, title]
              properties:
                project: { type: string, default: ArqonZero }
                name: { type: string, description: Human-friendly flow alias }
                type:
                  type: string
                  enum: [science_flow, code_flow, audit_flow, governance_flow]
                title: { type: string }
                summary: { type: string }
                initial_gate:
                  type: string
                  enum: [DRAFT, PLAN_READY, DEV_EVIDENCE_READY, INTEGRITY_GATE_PASSED, CLAIM_OR_PROMOTION_CANDIDATE, HUMAN_APPROVED]
                  default: DRAFT
      responses:
        '201': { description: Flow created }
  /v1/flows/{flow_ref}:
    get:
      summary: Load flow
      description: Loads a flow manifest by canonical flow_id or human-friendly name.
      parameters:
        - in: path
          name: flow_ref
          required: true
          schema: { type: string }
        - in: query
          name: project
          schema: { type: string, default: ArqonZero }
      responses:
        '200': { description: Flow manifest }
  /v1/flows/{flow_ref}/status:
    get:
      summary: Flow status
      description: Returns a compact flow status by canonical flow_id or human-friendly name.
      parameters:
        - in: path
          name: flow_ref
          required: true
          schema: { type: string }
        - in: query
          name: project
          schema: { type: string, default: ArqonZero }
      responses:
        '200': { description: Flow status }
  /v1/flows/{flow_ref}/artifacts:
    post:
      summary: Write flow artifact
      description: Writes an official flow artifact. Artifact types are role-gated.
      parameters:
        - in: path
          name: flow_ref
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artifact_type, title, body]
              properties:
                project: { type: string, default: ArqonZero }
                artifact_type: { type: string }
                title: { type: string }
                body: { type: string }
      responses:
        '201': { description: Flow artifact written }
  /v1/flows/{flow_ref}/advance:
    post:
      summary: Advance flow
      description: Human-only gate/status advancement in Flow Core v0.3.
      parameters:
        - in: path
          name: flow_ref
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gate_state]
              properties:
                project: { type: string, default: ArqonZero }
                gate_state:
                  type: string
                  enum: [DRAFT, PLAN_READY, DEV_EVIDENCE_READY, INTEGRITY_GATE_PASSED, CLAIM_OR_PROMOTION_CANDIDATE, HUMAN_APPROVED]
                status:
                  type: string
                  enum: [active, blocked, completed, archived]
                  default: active
                note: { type: string }
      responses:
        '200': { description: Flow advanced }

  /v1/science/research:
    post:
      operationId: scienceResearch
      summary: Science Monkeys research command.
      description: Creates or updates a science_flow by writing Explorer-owned research artifacts. May create a science_flow when flow_ref is omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScienceCommandRequest'
      responses:
        '201': { description: Science research artifact written }
  /v1/science/hypothesize:
    post:
      operationId: scienceHypothesize
      summary: Science Monkeys hypothesize command.
      description: Writes Hypothesizer-owned hypothesis artifacts to an existing science_flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScienceCommandRequest'
      responses:
        '201': { description: Science hypothesis artifact written }
  /v1/science/design-experiment:
    post:
      operationId: scienceDesignExperiment
      summary: Science Monkeys design experiment command.
      description: Writes Designer-owned experiment design artifacts to an existing science_flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScienceCommandRequest'
      responses:
        '201': { description: Science design artifact written }
  /v1/science/execute-experiment:
    post:
      operationId: scienceExecuteExperiment
      summary: Science Monkeys execute experiment command.
      description: Writes SCIENCE_EXECUTOR_AI-owned execution artifacts to an existing science_flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScienceCommandRequest'
      responses:
        '201': { description: Science execution artifact written }
  /v1/science/audit-experiment:
    post:
      operationId: scienceAuditExperiment
      summary: Science Monkeys audit experiment command.
      description: Writes SCIENCE_AUDITOR_AI-owned audit artifacts to an existing science_flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScienceCommandRequest'
      responses:
        '201': { description: Science audit artifact written }
  /v1/science/interpret:
    post:
      operationId: scienceInterpret
      summary: Science Monkeys interpret command.
      description: Writes Hypothesizer-owned interpretation artifacts to an existing science_flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScienceCommandRequest'
      responses:
        '201': { description: Science interpretation artifact written }
  /v1/science/iterate:
    post:
      operationId: scienceIterate
      summary: Science Monkeys iterate command.
      description: Writes Hypothesizer or Designer revision artifacts to an existing science_flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScienceCommandRequest'
      responses:
        '201': { description: Science iteration artifact written }
  /v1/science/record-finding:
    post:
      operationId: scienceRecordFinding
      summary: Science Monkeys record finding command.
      description: Writes SCIENCE_AUDITOR_AI-owned finding records to an existing science_flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScienceCommandRequest'
      responses:
        '201': { description: Science finding artifact written }
  /v1/science/share:
    post:
      operationId: scienceShareReserved
      summary: Reserved Science Monkeys share command.
      description: Reserved for Science Monkeys v0.1 Share Integration 001. Routes 001 returns SCIENCE_SHARE_NOT_IMPLEMENTED.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '501': { description: Share integration is not implemented in Routes 001 }
components:
  schemas:
    ScienceCommandRequest:
      type: object
      required: [body]
      properties:
        project:
          type: string
          default: ArqonZero
        flow_ref:
          type: string
          description: Existing science flow id or alias. Optional only for /v1/science/research.
        name:
          type: string
          description: Human-friendly science_flow alias used by /v1/science/research when creating a new flow.
        title:
          type: string
          description: Flow title for new research flows or artifact title fallback.
        summary:
          type: string
        artifact_type:
          type: string
          description: Optional route-allowed artifact type override.
        artifact_title:
          type: string
        body:
          type: string
